<svg width="1254" height="1254" viewBox="0 0 1254 1254" fill="none" xmlns="http://www.w3.org/2000/svg">

  <style>
    .mascot-float {
      transform-box: fill-box;
      transform-origin: center;
      animation: mascotFloat 3.2s ease-in-out infinite;
    }
    .body, .highlight {
      transform-box: fill-box;
      transform-origin: center;
      animation: softBreath 3.2s ease-in-out infinite;
    }
    .eye, .eye-glint {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: blink 5s ease-in-out infinite;
    }
    .glint-right, .glint-left {
      animation: blink 5s ease-in-out infinite, glintPulse 2.4s ease-in-out infinite;
    }
    .sparkles {
      transform-box: fill-box;
      transform-origin: center;
      animation: sparklePulse 2.8s ease-in-out infinite;
    }
    .shadow {
      transform-box: fill-box;
      transform-origin: center;
      opacity: .16;
      animation: shadowPulse 3.2s ease-in-out infinite;
    }
    @keyframes mascotFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(-1.2deg); }
    }
    @keyframes softBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.012); }
    }
    @keyframes blink {
      0%, 8%, 92%, 100% { transform: scaleY(1); }
      94%, 96% { transform: scaleY(.08); }
    }
    @keyframes glintPulse {
      0%, 100% { opacity: .92; }
      50% { opacity: 1; }
    }
    @keyframes sparklePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.045); opacity: .74; }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: .14; }
      50% { transform: scaleX(.88); opacity: .08; }
    }
    @media (prefers-reduced-motion: reduce) {
      .mascot-float, .body, .highlight, .eye, .eye-glint, .sparkles, .shadow { animation: none; }
    }
  </style>

